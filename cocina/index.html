<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Treze KDS - Cocina</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="app.css?v=3">
</head>
<body>
    <header class="kds-header">
        <div class="kds-brand">
            <!-- Treze Labs Logo SVG (No wordmark) -->
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 22h20L12 2z" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>
                <path d="M12 10l-4 8h8l-4-8z" fill="var(--accent)"/>
            </svg>
            <div>
                <h1>KITCHEN DISPLAY</h1>
                <span>Fiore de Enero — Powered by Treze</span>
            </div>
        </div>
        <div class="kds-status">
            <div class="view-toggle">
                <button id="btn-activos" class="toggle-btn active" onclick="switchView('activos')">Activos</button>
                <button id="btn-historial" class="toggle-btn" onclick="switchView('historial')">Historial</button>
            </div>
            <div id="loader" style="display:none;"><i class="ri-loader-4-line spin"></i> Sincronizando...</div>
            <div class="kds-clock" id="kds-clock">00:00</div>
        </div>
    </header>

    <main class="kds-board" id="kds-board">
        <!-- Tickets render here -->
    </main>

    <!-- Audios for alerts -->
    <audio id="audio-ding" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    
    <script src="cocina.js?v=3"></script>
</body>
</html>
