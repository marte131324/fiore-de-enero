<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Treze KDS - Cocina</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="app.css?v=5">
</head>
<body>
    <header class="kds-header">
        <div class="kds-brand">
            <!-- Treze Labs Logo SVG (No wordmark) -->
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 22h20L12 2z" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>
                <path d="M12 10l-4 8h8l-4-8z" fill="var(--accent)"/>
            </svg>
            <div>
                <h1>KITCHEN DISPLAY</h1>
                <span>Fiore de Enero — Powered by Treze</span>
            </div>
        </div>
        <div class="kds-status">
            <div class="view-toggle">
                <button id="btn-activos" class="toggle-btn active" onclick="switchView('activos')">Activos</button>
                <button id="btn-historial" class="toggle-btn" onclick="switchView('historial')">Historial</button>
            </div>
            <div id="loader" style="display:none;"><i class="ri-loader-4-line spin"></i> Sincronizando...</div>
            <div class="kds-clock" id="kds-clock">00:00</div>
        </div>
    </header>

    <main class="kds-board" id="kds-board">
        <!-- Tickets render here -->
    </main>

    <!-- Audios for alerts -->
    <audio id="audio-ding" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <!-- Modal Delete -->
    <div id="modal-delete" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:var(--bg-deep, #141912); padding:30px; border-radius:12px; border:1px solid #333; max-width:400px; width:90%; text-align:center;">
            <h2 style="color:var(--danger, #ff4444); margin-bottom:15px;">Borrar Orden</h2>
            <p style="color:var(--text-dim, #a0a0a0); margin-bottom:20px; font-size:14px;">Introduce el PIN Gerencial para eliminar esta comanda de la pantalla (no se guardará en el historial).</p>
            <input type="password" id="delete-pin" placeholder="PIN" style="width:100%; padding:15px; font-size:24px; text-align:center; background:#0a0d09; border:1px solid #333; color:#fff; border-radius:8px; margin-bottom:20px; outline:none; letter-spacing:8px;">
            <div style="display:flex; gap:10px;">
                <button onclick="document.getElementById('modal-delete').style.display='none'" style="flex:1; padding:12px; background:transparent; border:1px solid #555; color:#fff; border-radius:8px; cursor:pointer;">Cancelar</button>
                <button onclick="confirmarDeleteTicket()" style="flex:1; padding:12px; background:var(--danger, #ff4444); border:none; color:#fff; border-radius:8px; cursor:pointer; font-weight:bold;">Borrar</button>
            </div>
        </div>
    </div>
    
    <script src="cocina.js?v=6"></script>
</body>
</html>
